<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RZ_JOIAS | Exclusive Experience</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Montserrat:wght@200;400;600&display=swap" rel="stylesheet">
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    
    <style>
        :root {
            --primary: #d4af37; 
            --primary-glow: rgba(212, 175, 55, 0.4);
            --bg: #050505;
            --glass: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.08);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            background-color: var(--bg);
            color: #fff;
            font-family: 'Montserrat', sans-serif;
            overflow-x: hidden;
            /* Fundo sutil de gradiente que se move */
            background: radial-gradient(circle at 50% 50%, #111 0%, #050505 100%);
        }

        /* Header com animação de letras */
        header {
            height: 40vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            perspective: 1000px;
        }

        header h1 {
            font-family: 'Cinzel', serif;
            font-size: 2.8rem;
            color: var(--primary);
            letter-spacing: 12px;
            text-shadow: 0 0 30px var(--primary-glow);
            animation: titleEntrance 2s ease-out forwards;
        }

        @keyframes titleEntrance {
            from { opacity: 0; letter-spacing: 25px; transform: translateZ(-100px); }
            to { opacity: 1; letter-spacing: 12px; transform: translateZ(0); }
        }

        /* Barra de Busca Estilizada */
        .search-area {
            padding: 0 20px 40px;
            max-width: 400px;
            margin: 0 auto;
        }

        #modelSearch {
            width: 100%;
            padding: 15px 25px;
            background: var(--glass);
            border: 1px solid var(--glass-border);
            border-radius: 2px; /* Design mais reto/luxuoso */
            color: white;
            backdrop-filter: blur(10px);
            text-align: center;
            letter-spacing: 2px;
            font-size: 0.7rem;
            text-transform: uppercase;
        }

        /* Grid */
        .catalog {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 20px;
            padding: 0 20px 100px;
            max-width: 900px;
            margin: 0 auto;
        }

        /* Card Flutuante */
        .card {
            background: var(--glass);
            border: 1px solid var(--glass-border);
            border-radius: 4px;
            padding: 20px 15px;
            text-decoration: none;
            color: inherit;
            position: relative;
            backdrop-filter: blur(5px);
            display: flex;
            flex-direction: column;
            align-items: center;
            /* Animação de flutuação */
            animation: float 6s ease-in-out infinite;
            transition: all 0.5s cubic-bezier(0.23, 1, 0.32, 1);
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        .card:active { transform: scale(0.95); border-color: var(--primary); }

        /* Container da Imagem e Efeito Shine */
        .img-container {
            width: 100%;
            aspect-ratio: 1/1;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden; /* Corta o feixe de luz nas bordas */
        }

        .img-container img {
            width: 100%;
            height: auto;
            z-index: 2;
            filter: drop-shadow(0 10px 20px rgba(0,0,0,0.8));
        }

        /* O Feixe de Luz (Shine) */
        .shine-effect {
            position: absolute;
            top: -100%;
            left: -100%;
            width: 300%;
            height: 300%;
            background: linear-gradient(
                45deg,
                rgba(255,255,255,0) 45%,
                rgba(255,255,255,0.2) 50%,
                rgba(255,255,255,0) 55%
            );
            z-index: 3;
            transform: rotate(-45deg);
            animation: shineMove 6s infinite;
            pointer-events: none;
        }

        @keyframes shineMove {
            0% { transform: translate(-100%, -100%) rotate(-45deg); }
            20%, 100% { transform: translate(100%, 100%) rotate(-45deg); }
        }

        /* Detalhes do Modelo */
        .info { text-align: center; margin-top: 15px; }
        
        .model-number {
            font-size: 0.55rem;
            color: var(--primary);
            font-weight: bold;
            letter-spacing: 2px;
            margin-bottom: 5px;
            display: block;
        }

        .model-name {
            font-family: 'Cinzel', serif;
            font-size: 0.8rem;
            letter-spacing: 2px;
            font-weight: bold;
        }

        .mm-tag {
            font-size: 0.6rem;
            color: #666;
            margin-top: 4px;
            display: block;
        }

        /* Botão WhatsApp Flutuante Minimalista */
        .wa-float {
            position: fixed;
            bottom: 30px;
            right: 25px;
            width: 55px;
            height: 55px;
            background: #25d366;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            z-index: 999;
            animation: waPulse 2s infinite;
        }

        @keyframes waPulse {
            0% { box-shadow: 0 0 0 0 rgba(37, 211, 102, 0.6); }
            70% { box-shadow: 0 0 0 15px rgba(37, 211, 102, 0); }
            100% { box-shadow: 0 0 0 0 rgba(37, 211, 102, 0); }
        }

        /* Footer */
        footer {
            padding: 50px 0 120px;
            text-align: center;
            font-size: 0.6rem;
            color: #333;
            letter-spacing: 4px;
            text-transform: uppercase;
        }
    </style>
</head>
<body>

    <header>
        <h1 data-aos="zoom-out">RZ_JOIAS</h1>
        <p style="color: #444; font-size: 0.6rem; letter-spacing: 5px; margin-top: 10px;">EXCELLENCE & ARTISTRY</p>
    </header>

    <div class="search-area">
        <input type="text" id="modelSearch" placeholder="Encontrar modelo...">
    </div>

    <div class="catalog" id="mainGrid">
        <!-- JS irá preencher aqui -->
    </div>

    <footer>
        Handcrafted with Passion<br>
        RZ_JOIAS 2024
    </footer>

    <!-- Botão WhatsApp Voltou ao canto -->
    <a href="https://wa.me/553498702856" class="wa-float">
        <svg width="28" height="28" fill="white" viewBox="0 0 16 16">
            <path d="M13.601 2.326A7.854 7.854 0 0 0 7.994 0C3.627 0 .068 3.558.064 7.926c0 1.399.366 2.76 1.057 3.965L0 16l4.204-1.102a7.933 7.933 0 0 0 3.79.965h.004c4.368 0 7.926-3.558 7.93-7.93a7.898 7.898 0 0 0-2.327-5.507z"/>
        </svg>
    </a>

    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script>
        AOS.init({ duration: 1200, once: true });

        const modelos = [
            { id: 1, nome: "LIBRA", larg: "5.0 mm" },
            { id: 2, nome: "COLOMBIA", larg: "5.5 mm" },
            { id: 3, nome: "AM 20", larg: "2.0 mm" },
            { id: 4, nome: "AM 25", larg: "2.5 mm" },
            { id: 5, nome: "AM 30", larg: "3.0 mm" },
            { id: 6, nome: "AM 40", larg: "4.0 mm" },
            { id: 7, nome: "AM 50", larg: "5.0 mm" },
            { id: 8, nome: "LOVE", larg: "6.0 mm" },
            { id: 9, nome: "RTA 40", larg: "4.0 mm" },
            { id: 10, nome: "SAINT", larg: "4.60 mm" },
            { id: 11, nome: "OUSADA", larg: "5.0 mm" },
            { id: 12, nome: "MILLA", larg: "6.0 mm" },
            { id: 13, nome: "HADARA", larg: "4.0 mm" },
            { id: 14, nome: "DREAM", larg: "4.3 mm" },
            { id: 15, nome: "CADORE", larg: "5.5 mm" },
            { id: 16, nome: "ALTARIA", larg: "6.0 mm" },
            { id: 17, nome: "BELATRIX", larg: "4.0 mm" },
            { id: 18, nome: "ANGEL", larg: "4.0 mm" },
            { id: 19, nome: "SOL", larg: "4.0 mm" },
            { id: 20, nome: "KLONY", larg: "4.0 mm" },
            { id: 21, nome: "GRÉCIA", larg: "3.0 mm" },
            { id: 22, nome: "TURQUIA", larg: "3.0 mm" },
            { id: 23, nome: "ITÁLIA", larg: "4.0 mm" },
            { id: 24, nome: "ÍNDIA", larg: "3.0 mm" },
            { id: 25, nome: "FRANÇA", larg: "3.0 mm" },
            { id: 26, nome: "ESPANHA", larg: "3.0 mm" }
        ];

        const grid = document.getElementById('mainGrid');
        const search = document.getElementById('modelSearch');

        function draw(list) {
            grid.innerHTML = '';
            list.forEach((m, index) => {
                const waUrl = `https://wa.me/553498702856?text=Olá! Gostaria de informações sobre o Modelo ${m.id} (${m.nome})`;
                
                // Variamos a duração da flutuação para cada card
                const floatDuration = (5 + Math.random() * 3).toFixed(2);
                const floatDelay = (Math.random() * 5).toFixed(2);

                grid.innerHTML += `
                    <a href="${waUrl}" class="card" 
                       style="animation-duration: ${floatDuration}s; animation-delay: ${floatDelay}s;"
                       data-aos="fade-up">
                        <div class="img-container">
                            <div class="shine-effect"></div>
                            <img src="fotos1/download%20(${m.id}).png" alt="${m.nome}" loading="lazy">
                        </div>
                        <div class="info">
                            <span class="model-number">MODEL ${m.id.toString().padStart(2, '0')}</span>
                            <span class="model-name">${m.nome}</span>
                            <span class="mm-tag">${m.larg}</span>
                        </div>
                    </a>
                `;
            });
        }

        search.addEventListener('input', (e) => {
            const val = e.target.value.toLowerCase();
            const filter = modelos.filter(m => m.nome.toLowerCase().includes(val) || m.id.toString() === val);
            draw(filter);
        });

        draw(modelos);
    </script>
</body>
</html>
